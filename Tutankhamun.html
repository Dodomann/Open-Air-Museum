<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horus 3D Viewer</title>

  <!-- import map: تعريف مكتبة three -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"
    }
  }
  </script>

  <script src="tutankhamun.js" type="module"></script>

  <style>
    html,body{height:100%;margin:0;background:#111}
    canvas{display:block}
    #error{position:fixed;top:10px;left:10px;background:#c62828;color:#fff;
           padding:8px 10px;border-radius:6px;font:12px system-ui;display:none}
    
    #backButton {
        position: absolute;
        top: 20px;
        left: 20px;
        padding: 15px 30px;
        background: rgba(0, 0, 0, 0.8);
        color: gold;
        border: 2px solid gold;
        border-radius: 5px;
        cursor: pointer;
        z-index: 1000;
        font-size: 18px;
        font-family: Arial, sans-serif;
    }
    
    #backButton:hover {
        background: rgba(255, 215, 0, 0.2);
        box-shadow: 0 0 20px gold;
    }
    
    #interactionPrompt {
        position: fixed;
        bottom: 150px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #ffd700;
        padding: 15px 30px;
        border-radius: 10px;
        font-family: Arial;
        font-size: 18px;
        display: none;
        z-index: 100;
    }
    
   
    #objectInfoPanel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 20, 0.95);
        color: #f4e4c1;
        padding: 40px;
        border: 4px solid #ffd700;
        border-radius: 15px;
        font-family: 'Georgia', serif;
        max-width: 600px;
        display: none;
        z-index: 1000;
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
    
    
    #portalOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(210,180,140,0) 0%, rgba(0,0,0,1) 100%);
        pointer-events: none;
        opacity: 0;
        z-index: 9999;
        transition: opacity 2s;
    }
    
    #portalOverlay.active {
        opacity: 1;
    }
    
    @keyframes sandSwirl {
        0% { 
            transform: translate(-50%, -50%) scale(0) rotate(0deg); 
            opacity: 0; 
        }
        20% { 
            opacity: 1; 
        }
        100% { 
            transform: translate(-50%, -50%) scale(4) rotate(1080deg); 
            opacity: 0; 
        }
    }
    
    .sand-particle {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 300px;
        height: 300px;
        border: 3px solid #d2b48c;
        border-radius: 50%;
        animation: sandSwirl 3s ease-in-out;
        box-shadow: 0 0 30px rgba(210, 180, 140, 0.8), 
                    inset 0 0 30px rgba(255, 215, 0, 0.3);
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    
    .portal-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: gold;
        font-size: 42px;
        font-family: 'Papyrus', fantasy;
        text-shadow: 0 0 20px gold, 0 0 40px rgba(210, 180, 140, 0.8);
        animation: fadeIn 1s;
        white-space: nowrap;
    }
    
    @keyframes sandfall {
        0% { top: -10%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 110%; opacity: 0; }
    }
    
    .sand-grain {
        position: absolute;
        width: 3px;
        height: 3px;
        background: #d2b48c;
        border-radius: 50%;
        animation: sandfall 3s linear;
        box-shadow: 0 0 5px rgba(210, 180, 140, 0.8);
    }
  </style>
</head>
<body>
  <div id="error"></div>
  
  <!-- Back Button to Return to Main World -->
  <button id="backButton" onclick="returnToMainWorld()">
    ← Return to Main World
  </button>
  
  <!-- Interaction Prompt -->
  <div id="interactionPrompt">Press 'E' to interact</div>
  
  <!-- Object Info Panel -->
  <div id="objectInfoPanel"></div>
  
  <!-- Portal Overlay -->
  <div id="portalOverlay"></div>
  
  <script>
    
    function returnToMainWorld() {
        const portalOverlay = document.getElementById('portalOverlay');
        
        
        for (let i = 0; i < 12; i++) {
            setTimeout(() => {
                const particle = document.createElement('div');
                particle.className = 'sand-particle';
                particle.style.animationDelay = `${i * 0.15}s`;
                particle.style.borderColor = i % 2 === 0 ? '#d2b48c' : 'gold';
                particle.style.width = `${200 + i * 20}px`;
                particle.style.height = `${200 + i * 20}px`;
                portalOverlay.appendChild(particle);
            }, i * 100);
        }
        
        
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const grain = document.createElement('div');
                grain.className = 'sand-grain';
                grain.style.left = `${Math.random() * 100}%`;
                grain.style.animationDelay = `${Math.random() * 2}s`;
                grain.style.animationDuration = `${2 + Math.random() * 2}s`;
                portalOverlay.appendChild(grain);
            }, Math.random() * 1000);
        }
        
        
        setTimeout(() => {
            const text = document.createElement('div');
            text.className = 'portal-text';
            text.textContent = 'Returning to Amenhotep II\'s World...';
            portalOverlay.appendChild(text);
        }, 800);
        
        
        portalOverlay.classList.add('active');
        
        
        setTimeout(() => {
            window.location.href = 'index.html'; 
        }, 3000);
    }
  </script>
</body>
</html>
