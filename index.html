<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egyptian open air museum</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        
        /* PORTAL ANIMATION STYLES */
        #portalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(210,180,140,0) 0%, rgba(0,0,0,1) 100%);
            pointer-events: none;
            opacity: 0;
            z-index: 9999;
            transition: opacity 2s;
        }
        
        #portalOverlay.active {
            opacity: 1;
        }
        
        @keyframes sandSwirl {
            0% { 
                transform: translate(-50%, -50%) scale(0) rotate(0deg); 
                opacity: 0; 
            }
            20% { 
                opacity: 1; 
            }
            100% { 
                transform: translate(-50%, -50%) scale(4) rotate(1080deg); 
                opacity: 0; 
            }
        }
        
        .sand-particle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            border: 3px solid #d2b48c;
            border-radius: 50%;
            animation: sandSwirl 3s ease-in-out;
            box-shadow: 0 0 30px rgba(210, 180, 140, 0.8), 
                        inset 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .portal-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: gold;
            font-size: 42px;
            font-family: 'Papyrus', fantasy;
            text-shadow: 0 0 20px gold, 0 0 40px rgba(210, 180, 140, 0.8);
            animation: fadeIn 1s;
            white-space: nowrap;
        }
        
        @keyframes sandfall {
            0% { 
                top: -10%; 
                opacity: 0; 
            }
            10% { 
                opacity: 1; 
            }
            90% { 
                opacity: 1; 
            }
            100% { 
                top: 110%; 
                opacity: 0; 
            }
        }
        
        .sand-grain {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #d2b48c;
            border-radius: 50%;
            animation: sandfall 3s linear;
            box-shadow: 0 0 5px rgba(210, 180, 140, 0.8);
        }
    </style>
    <script src="main.js" type="module" defer></script>
</head>
<body>
    <!-- Interaction Prompt -->
    <div id="interactionPrompt" style="
        position: fixed;
        bottom: 150px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #ffd700;
        padding: 15px 30px;
        border-radius: 10px;
        font-family: Arial;
        font-size: 18px;
        display: none;
        z-index: 100;
    ">
        Press 'E' to interact
    </div>

    <!-- Object Info Panel -->
    <div id="objectInfoPanel" style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 20, 0.95);
        color: #f4e4c1;
        padding: 40px;
        border: 4px solid #ffd700;
        border-radius: 15px;
        font-family: 'Georgia', serif;
        max-width: 600px;
        display: none;
        z-index: 1000;
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    ">
    </div>
    
    <!-- Portal Overlay -->
    <div id="portalOverlay"></div>
</body>
</html>
